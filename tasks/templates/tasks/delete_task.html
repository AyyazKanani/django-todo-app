{% extends 'tasks/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-4">Delete Task</h3>
                <p class="text-muted">Are you sure you want to delete: <strong>{{ task.title }}</strong> ?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mt-2">Yes, Delete</button>
                </form>
                <p class="mt-3">
                    <a href="{% url 'task_list' %}">Cancel</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
